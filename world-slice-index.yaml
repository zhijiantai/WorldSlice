    reason: "x86 specific MMU setup, syscall entry, interrupt handling"
  
  - module: block (full)
    files: 98
    priority: medium
    reason: "I/O scheduling, multi-queue, drivers aside from the read path already covered"
  
  - module: security (LSM)
    files: 263
    priority: low
    reason: "SELinux, AppArmor hooks — orthogonal to core architecture demo"

  - module: ipc
    files: 12
    priority: low
    reason: "System V IPC, POSIX message queues — legacy, minimal architectural impact"
  
  - module: crypto
    files: 166
    priority: low
    reason: "skcipher, aead, hash — well-defined API surface, low cross-subsystem coupling"
  
  - module: lib
    files: 737
    priority: low
    reason: "list, rbtree, xarray — utility data structures, referenced by all WS but not primary subject"
  
  - module: drivers (device model)
    files: 33835
    priority: very_low
    reason: "Driver model architecture (bus/driver/device), not per-driver details"
  
  - module: include/
    files: 6662
    priority: very_low
    reason: "Shared header surface — implicitly covered by each WS's own provenance"
