design_principles:
  - "Monolithic but Modular: single kernel image, clear subsystem boundaries via documented APIs"
  - "No Stable Internal API: subsystems can change internal APIs between versions"
  - "Tight Coupling at Core: kernel/ and mm/ share deep data structures (mm_struct, task_struct)"
  - "Loose Coupling at Periphery: fs/, net/, drivers/ have well-defined interface layers"
  - "include/linux/ Is The Contract: shared headers define API contracts between subsystems"

demo_strategy: >
  展示 4 個 WS，每個代表不同分析深度：
  1. ws-init.yaml — 開機流程追蹤（call stack 深度）
  2. ws-net.yaml — TCP socket 生命周期（跨子系統資料流）
  3. ws-locking.yaml — 同步機制決策（原語對比）
  4. ws-fs.yaml — 儲存路徑（ext4 + journal + writeback）
  其餘 WS 在 MissingScope/roadmap 中列出，demo 時一句話帶過。

missing_scope:
