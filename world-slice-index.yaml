metadata:
  title: "Linux Kernel World Slice — 分層世界模型"
  version: "1.0"
  generated: "2026-07-04"
  git_commit: "e9019fcafe0040228b8631c30f97ae1adb61bcdc"
  git_tag: "v2.55.0"

design_purpose: >
  World Slice 是從原始碼中提取的最小可推理世界模型，
  目的是讓 AI（或其他工程師）不需讀完整份原始碼就能回答關於該子系統的設計問題。
  每個 WS = entities + relationships + constraints + mechanisms + provenance。
  本 index 管理 Linux kernel 全部分層 WS，選擇以 H2 (Layered by Subsystem) 方案建構。

